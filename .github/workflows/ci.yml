name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run tests
        run: swift test --parallel
      - name: Build app
        run: ./build.sh
      - name: Verify binary
        run: file build/Hyprmon.app/Contents/MacOS/hyprmon
