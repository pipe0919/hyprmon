# hyprmon configuration — copy to ~/.config/hyprmon/config.toml.
# Edits are picked up live (no restart needed).
#
# On first launch hyprmon installs a LaunchAgent so it starts at login.
# Toggle this from the menubar item's right-click menu (Launch at Login).
# To pick a theme: right-click the menubar icon → Theme.

# --- panel ---
opacity      = 0.85           # 0.0 (transparent) to 1.0 (solid)
accent       = "#7AA2F7"      # hex color, used for the small charging ⚡ icon

# --- refresh rates ---
refresh_ms        = 1000      # system metrics tick (default 1s)
claude_refresh_ms = 60000     # claude usage tick (default 60s — remote API is rate-limited)

# --- which sections to render ---
[modules]
cpu       = true
ram       = true
battery   = true              # ignored on desktop Macs without a battery
processes = true
claude    = true

# --- top processes ---
[processes]
count   = 5
sort_by = "cpu"               # cpu | ram | energy

# --- Claude usage ---
# Reads your real usage from Anthropic's OAuth API (the same endpoint
# Claude Code itself queries). The token is auto-discovered from your
# macOS Keychain or ~/.claude/.credentials.json — no setup needed if
# you've run `claude login`. If no token is found, the Claude section
# auto-hides.
[claude]
show_5h     = true
show_weekly = true
